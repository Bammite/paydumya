<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Partenaire PayDunya</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 720px; margin: 30px auto; padding: 0 16px; }
        form { border: 1px solid #ddd; border-radius: 8px; padding: 16px; }
        label { display: block; margin-top: 10px; font-weight: 600; }
        input, select, button { width: 100%; padding: 10px; margin-top: 6px; box-sizing: border-box; }
        button { margin-top: 16px; cursor: pointer; }
        #output { white-space: pre-wrap; background: #f7f7f7; border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-top: 16px; font-size: 13px; }
    </style>
  </head>
<body>
    <h1>Test Partenaire PayDunya</h1>
    <p>Formats acceptes pour le Senegal: <code>781234567</code> ou <code>+221781234567</code>.</p>
    <form id="paymentForm" method="post">
        <label for="nom">Votre nom</label>
        <input type="text" name="name" value="test001">

        <label for="numero">numero</label>
        <input type="text" name="phone_number" value="+221781941351">

        <label for="amount">somme</label>
        <input type="number" name="amount" value="1000">

        <label for="payment_method">Moyen de paiement</label>
        <select id="payment_method" name="payment_method">
            <option value="orange_money">Orange Money</option>
            <option value="wave">Wave</option>
            <option value="free_money">Free Money</option>
            <option value="expresso">Expresso</option>
            <option value="wizall">Wizall</option>
        </select>

        <label for="base_url">Base URL</label>
        <input type="text" name="base_url" value="https://pay.bammite.com/paydumya">

        <label for="callback_url">Callback URL</label>
        <input type="text" name="callback_url" value="https://pay.bammite.com/paydumya">

        <label for="return_url">Return URL</label>
        <input type="text" name="return_url" value="https://pay.bammite.com/paydumya">

        <label for="cancel_url">Cancel URL</label>
        <input type="text" name="cancel_url" value="https://pay.bammite.com/paydumya">

        

        <button type="submit">PayDunya Test Payment</button>
    </form>
    <div id="output">Resultat du test...</div>
    <script src="../collab/collabexterne.js"></script>
    <script src="./payment_intermediate.js"></script>
</body>
</html>
